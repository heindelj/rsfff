# Charge-aware MLIP on the mixed H2O + H3O+ set (docs/charge_aware_embedding.md, M2).
# Loss weights are in model units (Ha, Ha/A, e*A, e, e^2 A^2/Ha); dipole/response
# targets are converted from atomic units at load time (see train/data.py).
run_name: h2o_h3o_charge
device: auto            # cuda > cpu (charge path skips MPS: batched linalg gaps)
dtype: float64          # SCF residual ~tol enters attach error; f64 is cheap at this size
checkpoint_root: checkpoints

data:
  path:
    - data/labels/h2o.extxyz
    - data/labels/h3o+.extxyz
  reference_energies: data/atomic_references.json
  isolated_species: data/isolated_species.extxyz
  holdout_fraction: 0.1
  seed: 0

features:
  cutoff: 5.0
  n_max: 6
  l_max: 3
  selected_lambdas: [0, 2]   # add 1 (and charge.dipole_head: true) for atomic dipoles
  backend: e3nn
  density_channels: 8

charge:
  emb_dim: 16
  q_hidden: 16
  weight_hidden: 32
  charge_channels: 4
  hidden: 64
  depth: 2
  alpha_hidden: 64
  alpha_depth: 2
  alpha_equiv_channels: 32
  alpha_positive_isotropic: true
  dipole_head: false
  eta_init: 0.5              # Ha/e^2 starting hardness
  scf_max_iter: 30
  scf_tol: 1.0e-10
  scf_damping: 0.0
  attach_steps: 2            # exact 2nd-order training grads for alpha / dmu-dR losses
  hessian_in_graph: true
  freeze_charges: false      # true = the q=Q/n ablation (no SCF)

train:
  epochs: 100
  batch_size: 16
  learning_rate: 1.0e-3
  weight_decay: 0.0
  grad_clip: 5.0
  energy_weight: 1.0
  force_weight: 1.0
  dipole_weight: 10.0
  dmu_dr_weight: 1.0
  dmu_dr_every: 2            # stride the 3 double-backwards of dmu/dR
  alpha_weight: 0.1
  alpha_consistency_weight: 0.0   # logged regardless; > 0 to also penalize
  iso_weight: 100.0
  q_l2_weight: 1.0e-3
  eval_every: 5
